<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biliload</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="创建字幕任务">
        <div class="brand">
          <div class="mark">B</div>
          <div>
            <h1>Biliload</h1>
            <p>下载 B 站视频并生成双语字幕</p>
          </div>
        </div>
        <a class="ghost-button" href="/static/extension.html" target="_blank" rel="noreferrer">B站导入</a>
      </section>

      <section class="panel">
        <form id="job-form" class="job-form">
          <label class="url-field">
            <span>B站链接或 BV 号</span>
            <input
              id="url"
              name="url"
              type="text"
              required
              placeholder="BV1ngEB6REmS 或 https://www.bilibili.com/video/BV..."
              autocomplete="off"
            />
          </label>

          <fieldset class="task-type" aria-label="任务类型">
            <label>
              <input type="radio" name="task_type" value="subtitle" checked />
              <span>双语字幕</span>
            </label>
            <label>
              <input type="radio" name="task_type" value="video" />
              <span>下载视频</span>
            </label>
          </fieldset>

          <div class="control-grid">
            <label>
              <span>视频语言</span>
              <select id="source-language" name="source_language">
                <option value="auto">自动识别</option>
                <option value="cantonese">粤语</option>
                <option value="zh">中文/普通话</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="fr">法语</option>
                <option value="de">德语</option>
                <option value="es">西班牙语</option>
                <option value="ru">俄语</option>
              </select>
            </label>

            <label>
              <span>Whisper 模型</span>
              <select id="whisper-model" name="whisper_model">
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large-v3-turbo">large-v3-turbo</option>
                <option value="base">base</option>
              </select>
            </label>

            <label>
              <span>翻译器</span>
              <select id="translator" name="translator">
                <option value="google">Google</option>
                <option value="none">不翻译</option>
              </select>
            </label>

            <label>
              <span>Cookies</span>
              <select id="cookies-browser" name="cookies_browser">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="none">不用</option>
              </select>
            </label>
          </div>

          <div class="form-row">
            <button id="submit-button" type="submit">开始</button>
          </div>
        </form>
      </section>

      <section class="jobs-header">
        <h2>任务</h2>
        <button id="refresh-button" class="ghost-button" type="button">刷新</button>
      </section>

      <section id="jobs" class="jobs" aria-live="polite"></section>
    </main>

    <template id="job-template">
      <article class="job-card">
        <div class="job-topline">
          <div>
            <h3 class="job-title"></h3>
            <p class="job-meta"></p>
          </div>
          <span class="status"></span>
        </div>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
        <p class="message"></p>
        <div class="file-links"></div>
      </article>
    </template>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
