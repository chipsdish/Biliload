<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B站导入</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div class="brand">
          <div class="mark">B</div>
          <div>
            <h1>B站导入</h1>
            <p>Chrome 扩展目录：extension/</p>
          </div>
        </div>
        <a class="ghost-button" href="/">返回</a>
      </section>

      <section class="panel">
        <div class="jobs">
          <article class="job-card">
            <h3 class="job-title">安装</h3>
            <p class="message">打开 chrome://extensions，启用开发者模式，加载当前项目的 extension 目录。</p>
          </article>
          <article class="job-card">
            <h3 class="job-title">使用</h3>
            <p class="message">生成字幕后打开对应 B 站视频页，扩展会从本地应用读取双语字幕并叠加到播放器上。</p>
          </article>
          <article class="job-card">
            <h3 class="job-title">更新后</h3>
            <p class="message">如果更新了 Biliload 代码，需要在 chrome://extensions 里点击本扩展的刷新按钮，再重新打开 B 站视频页。</p>
          </article>
          <article class="job-card">
            <h3 class="job-title">要求</h3>
            <p class="message">本地应用需要保持运行，地址为 http://127.0.0.1:8787。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
